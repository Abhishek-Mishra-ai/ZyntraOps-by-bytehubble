apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-cluster-agent
  namespace: sre-system
  labels:
    app: sre-cluster-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-cluster-agent
  template:
    metadata:
      labels:
        app: sre-cluster-agent
    spec:
      serviceAccountName: sre-agent-sa
      containers:
        - name: agent
          image: sre-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CLUSTER_ID
              value: "production-us-east"
            - name: AI_BACKEND
              value: "ollama"
            - name: CONTROL_PLANE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: control_plane_url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: database_url
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: slack_webhook_url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Namespace
metadata:
  name: sre-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent-sa
  namespace: sre-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "nodes"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-agent-binding
subjects:
  - kind: ServiceAccount
    name: sre-agent-sa
    namespace: sre-system
roleRef:
  kind: ClusterRole
  name: sre-agent-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: sre-agent-svc
  namespace: sre-system
spec:
  selector:
    app: sre-cluster-agent
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
